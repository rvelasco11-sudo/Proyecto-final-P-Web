<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce - Acceso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Usuario" required>
                <input type="password" id="loginPass" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
        </div>

        <div class="form-box">
            <h2>Registrarse</h2>
            <form id="registerForm">
                <input type="text" id="regUser" placeholder="Nuevo Usuario" required>
                <input type="password" id="regPass" placeholder="Contraseña" required>
                <button type="submit">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/user';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;

            const res = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.error) alert(data.error);
            else {
                alert('¡Registro exitoso! Ya puedes iniciar sesión.');
                document.getElementById('registerForm').reset();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.error) alert(data.error);
            else {
                localStorage.setItem('token', data.token);
                alert('Bienvenido al sistema');
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
